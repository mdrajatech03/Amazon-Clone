<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<div class="logo">Amazon</div>

<input type="text" id="search" placeholder="Search products">

<div class="cart">
<a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>
</div>

</header>

<div class="hero">
<h2>Welcome to Amazon Clone</h2>
</div>


<div class="filter">

<button onclick="filterProduct('all')">All</button>
<button onclick="filterProduct('electronics')">Electronics</button>
<button onclick="filterProduct('fashion')">Fashion</button>
<button onclick="filterProduct('home')">Home</button>

</div>


<section class="products">

<div class="product electronics">
<img src="https://picsum.photos/200?1">
<h3>Headphones</h3>
<p>$49</p>
<button onclick="addCart('Headphones',49)">Add to Cart</button>
</div>

<div class="product electronics">
<img src="https://picsum.photos/200?2">
<h3>Smart Watch</h3>
<p>$99</p>
<button onclick="addCart('Smart Watch',99)">Add to Cart</button>
</div>

<div class="product fashion">
<img src="https://picsum.photos/200?3">
<h3>Shoes</h3>
<p>$79</p>
<button onclick="addCart('Shoes',79)">Add to Cart</button>
</div>

<div class="product fashion">
<img src="https://picsum.photos/200?4">
<h3>T-Shirt</h3>
<p>$29</p>
<button onclick="addCart('Tshirt',29)">Add to Cart</button>
</div>

<div class="product home">
<img src="https://picsum.photos/200?5">
<h3>Chair</h3>
<p>$120</p>
<button onclick="addCart('Chair',120)">Add to Cart</button>
</div>

<div class="product home">
<img src="https://picsum.photos/200?6">
<h3>Lamp</h3>
<p>$35</p>
<button onclick="addCart('Lamp',35)">Add to Cart</button>
</div>

</section>


<footer>

<div class="footer-top">
Back to Top
</div>

<div class="footer-bottom">
© 2026 Amazon Clone
</div>

</footer>

<script src="script.js"></script>

</body>
  </html>
